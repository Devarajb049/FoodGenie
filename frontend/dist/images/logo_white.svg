<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="100%" height="100%">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7043" />
      <stop offset="100%" stop-color="#FF5722" />
    </linearGradient>
  </defs>
  
  <!-- Icon Container (cx=32, cy=32, r=32) -->
  <g transform="translate(10, 8)">
    <!-- Orange Background Circle -->
    <circle cx="32" cy="32" r="32" fill="url(#logoGrad)" />
    
    <!-- White Fork & Knife Circle graphic -->
    <circle cx="32" cy="32" r="22" stroke="#FFFFFF" stroke-width="3" fill="none" />
    
    <!-- Fork -->
    <!-- Handle -->
    <rect x="25" y="29.25" width="2" height="15" rx="1" fill="#FFFFFF" />
    <!-- Base -->
    <path d="M21.75 23.75 c0 3.5 8.5 3.5 8.5 0 v-5.5 h-8.5 z" fill="#FFFFFF" />
    <!-- Tines -->
    <rect x="21.75" y="15.5" width="1.7" height="8" rx="0.7" fill="#FFFFFF" />
    <rect x="25.15" y="15.5" width="1.7" height="8" rx="0.7" fill="#FFFFFF" />
    <rect x="28.55" y="15.5" width="1.7" height="8" rx="0.7" fill="#FFFFFF" />
    
    <!-- Knife -->
    <!-- Handle -->
    <rect x="37" y="29.25" width="2" height="15" rx="1" fill="#FFFFFF" />
    <!-- Blade -->
    <path d="M37 29.25 v-12 c0 -3.5 5 -3.5 5 0 v8.25 c0 2 -5 3.75 -5 3.75 z" fill="#FFFFFF" />
  </g>
  
  <!-- Text: OrderIt -->
  <!-- "Order" in White, "It" in Orange -->
  <text x="90" y="53" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="38" font-weight="800" fill="#FFFFFF">Food<tspan fill="#FF5722">Genie</tspan></text>
</svg>
